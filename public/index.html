<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>6DOF Robot Arm Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="root">
    <h1>6DOF Robot Arm Simulator</h1>
    <div class="controls" id="controls"></div>
    <div id="renderer"></div>
    <div class="footer">
      <p>Open from iPad: <code>http://YOUR_PC_IP:3000</code> or <code>http://127.0.0.1:3000</code> locally.</p>
    </div>
  </div>

  <script type="module">
    import * as THREE from '/modules/three/build/three.module.js';
    import { OrbitControls } from '/modules/three/examples/jsm/controls/OrbitControls.js';
    window.THREE = THREE;
    window.OrbitControls = OrbitControls;
    import('/app.js').catch((err) => {
      console.error('Failed to load app.js:', err);
      const container = document.getElementById('renderer');
      if (container) container.innerHTML = '<div style="color:#fff;padding:20px">Failed to load app.js. Check console for details.</div>';
    });
  </script>
</body>
</html>
